version: 2

project_name: falcon

before:
  hooks:
    - go mod tidy
    - go build ./...

builds:
  - id: falcon
    main: ./cmd/falcon
    binary: falcon
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "arm64" }}arm64
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - README.md
      - LICENSE

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: "^feat"
      order: 0
    - title: Bug Fixes
      regexp: "^fix"
      order: 1
    - title: Others
      order: 999

release:
  github:
    owner: blackcoderx
    name: falcon
  draft: false
  prerelease: auto
  skip_upload: false
  name_template: "Falcon v{{.Version}}"
  header: |
    ## Falcon v{{.Version}}

    AI-powered API debugging that understands your codebase.
  footer: |
    ---

    **Full Changelog**: https://github.com/blackcoderx/falcon/compare/{{ .PreviousTag }}...{{ .Tag }}

brews:
  - repository:
      owner: blackcoderx
      name: homebrew-falcon
      token: "{{ .Env.GH_PAT }}"
    directory: Formula
    homepage: "https://github.com/blackcoderx/falcon"
    description: "Terminal-based AI agent for API developers"
    license: "MIT"
    skip_upload: auto
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Brew formula update for {{ .ProjectName }} version {{ .Tag }}"

scoops:
  - repository:
      owner: blackcoderx
      name: scoop-falcon
      token: "{{ .Env.GH_PAT }}"
    homepage: "https://github.com/blackcoderx/falcon"
    description: "Terminal-based AI agent for API developers"
    license: MIT
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    commit_msg_template: "Scoop update for {{ .ProjectName }} version {{ .Tag }}"
    skip_upload: auto
